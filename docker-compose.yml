version: '3.8'

services:
  # PHP Application Service
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bagops_app
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - .:/var/www/html/bagops
      - ./storage:/var/www/html/bagops/storage
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=bagops_db
      - DB_USER=root
      - DB_PASSWORD=rootpassword
      - APACHE_DOCUMENT_ROOT=/var/www/html
    depends_on:
      - mysql
    networks:
      - bagops_network

  # MySQL Database Service
  mysql:
    image: mysql:8.0
    container_name: bagops_mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: bagops_db
      MYSQL_USER: bagops_user
      MYSQL_PASSWORD: bagops_pass
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d
      - ./backup_20260302_101114.sql:/docker-entrypoint-initdb.d/backup.sql
    networks:
      - bagops_network
    command: --default-authentication-plugin=mysql_native_password

  # phpMyAdmin Service
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: bagops_phpmyadmin
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: rootpassword
    depends_on:
      - mysql
    networks:
      - bagops_network

  # Redis Cache (Optional untuk performance)
  redis:
    image: redis:7-alpine
    container_name: bagops_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - bagops_network

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  bagops_network:
    driver: bridge
